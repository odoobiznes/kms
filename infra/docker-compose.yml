version: '3.8'

services:
  # === Frontend ===
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=http://supabase-kong:8000
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_HOCUSPOCUS_URL=ws://localhost:1234
      - NEXT_PUBLIC_LITELLM_URL=http://litellm:4000
    depends_on:
      - supabase-db
      - hocuspocus
    networks:
      - kms-net

  # === Collaborative Editing ===
  hocuspocus:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.hocuspocus
    restart: unless-stopped
    ports:
      - "127.0.0.1:1234:1234"
    environment:
      - DATABASE_URL=postgresql://kms_user:${DB_PASSWORD}@supabase-db:5432/kms
    depends_on:
      - supabase-db
    networks:
      - kms-net

  # === MCP Server ===
  mcp-server:
    build:
      context: ../apps/mcp-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql://kms_user:${DB_PASSWORD}@supabase-db:5432/kms
      - LITELLM_URL=http://litellm:4000
      - LITELLM_KEY=${LITELLM_MASTER_KEY}
    depends_on:
      - supabase-db
      - litellm
    networks:
      - kms-net

  # === AI Gateway (LiteLLM) ===
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://kms_user:${DB_PASSWORD}@supabase-db:5432/litellm
    depends_on:
      - supabase-db
      - redis
    networks:
      - kms-net

  # === Database (Supabase PostgreSQL) ===
  supabase-db:
    image: supabase/postgres:15-3-0
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - kms-db-data:/var/lib/postgresql/data
      - ../packages/db/migrations:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=kms
      - POSTGRES_USER=kms_user
    networks:
      - kms-net

  # === Supabase Auth ===
  supabase-auth:
    image: supabase/gotrue:v2.143.0
    restart: unless-stopped
    environment:
      - GOTRUE_API_HOST=0.0.0.0
      - GOTRUE_API_PORT=9999
      - API_EXTERNAL_URL=${API_EXTERNAL_URL:-http://localhost:8000}
      - GOTRUE_DB_DRIVER=postgres
      - GOTRUE_DB_DATABASE_URL=postgresql://kms_user:${DB_PASSWORD}@supabase-db:5432/kms
      - GOTRUE_SITE_URL=${SITE_URL:-http://localhost:3000}
      - GOTRUE_JWT_SECRET=${JWT_SECRET}
      - GOTRUE_MAILER_AUTOCONFIRM=true
    depends_on:
      - supabase-db
    networks:
      - kms-net

  # === Supabase REST API ===
  supabase-rest:
    image: postgrest/postgrest:v12.0.2
    restart: unless-stopped
    environment:
      - PGRST_DB_URI=postgresql://kms_user:${DB_PASSWORD}@supabase-db:5432/kms
      - PGRST_DB_SCHEMAS=public,storage
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_JWT_SECRET=${JWT_SECRET}
    depends_on:
      - supabase-db
    networks:
      - kms-net

  # === Supabase Realtime ===
  supabase-realtime:
    image: supabase/realtime:v2.25.50
    restart: unless-stopped
    environment:
      - DB_HOST=supabase-db
      - DB_PORT=5432
      - DB_USER=kms_user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=kms
      - PORT=4001
      - JWT_SECRET=${JWT_SECRET}
      - REPLICATION_MODE=RLS
      - SECURE_CHANNELS=true
    depends_on:
      - supabase-db
    networks:
      - kms-net

  # === Redis ===
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - kms-redis-data:/data
    networks:
      - kms-net

  # === n8n (Workflow Automation) ===
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - kms-n8n-data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - GENERIC_TIMEZONE=Europe/Prague
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=supabase-db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=kms_user
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - supabase-db
    networks:
      - kms-net

volumes:
  kms-db-data:
  kms-redis-data:
  kms-n8n-data:

networks:
  kms-net:
    driver: bridge
