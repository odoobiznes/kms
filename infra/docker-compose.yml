services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4100"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--bind", "127.0.0.1", "--requirepass", "${DB_PASSWORD}"]
    volumes:
      - kms-redis-data:/data

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - kms-n8n-data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - GENERIC_TIMEZONE=Europe/Prague
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=127.0.0.1
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=kms
      - DB_POSTGRESDB_USER=kms_user
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}

volumes:
  kms-redis-data:
  kms-n8n-data:
